<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Citation du jour</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,500&family=Inter:wght@400;500&display=swap');
  html,body{margin:0;height:100%;background:#2A2438;overflow:hidden;}
  .widget{
    width:100%;height:100%;box-sizing:border-box;
    padding:28px 32px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:radial-gradient(circle at 50% 100%, #352D47 0%, #2A2438 65%);
    color:#F4ECD8;font-family:'Inter',sans-serif;text-align:center;
  }
  .quote-mark{font-family:'Cormorant Garamond',serif;font-size:32px;color:#C9A15A;line-height:0.5;margin-bottom:6px;}
  .quote{
    font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:500;
    font-size:clamp(15px,3.4vw,20px);
    line-height:1.45;color:#F4ECD8;max-width:480px;
  }
  .moon-divider{width:50px;height:1px;background:#8B7299;margin:16px 0 10px;position:relative;}
  .moon-divider::after{content:'';position:absolute;left:50%;top:-3px;width:6px;height:6px;border-radius:50%;background:#C9A15A;transform:translateX(-50%);}
  .source{font-size:11px;color:#8B7299;letter-spacing:0.05em;text-transform:uppercase;}
</style>
</head>
<body>
  <div class="widget">
    <div class="quote-mark">"</div>
    <div class="quote" id="quote">Chargement...</div>
    <div class="moon-divider"></div>
    <div class="source" id="source"></div>
  </div>
<script>
// Modifie cette liste avec tes propres citations — une par ligne, format {texte, source}
const citations = [
  {texte:"On ne trouve pas la lumière en évitant l'obscurité, mais en la traversant.", source:"Sagesse populaire"},
  {texte:"La lune ne se compare jamais au soleil. Elle brille à sa façon, à son heure.", source:"Pensée du jour"},
  {texte:"Ce qui pousse lentement pousse solidement.", source:"Proverbe"},
  {texte:"L'intuition est une intelligence silencieuse.", source:"Réflexion"},
  {texte:"Chaque phase a sa raison d'être, même celle qui semble vide.", source:"Pensée lunaire"},
  {texte:"On ne maîtrise pas une marée, on apprend à naviguer avec elle.", source:"Réflexion"},
  {texte:"Le repos est aussi une forme de progression.", source:"Pensée du jour"}
];
// Une citation par jour, stable sur 24h (basé sur la date, pas aléatoire à chaque rafraîchissement)
const today = new Date();
const dayIndex = Math.floor(today.getTime() / 86400000) % citations.length;
const c = citations[dayIndex];
document.getElementById('quote').textContent = c.texte;
document.getElementById('source').textContent = c.source;
</script>
</body>
</html>
