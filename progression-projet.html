<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Progression projet</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Inter:wght@400;500;600&display=swap');
  html,body{margin:0;height:100%;background:#2A2438;overflow:hidden;}
  .widget{
    width:100%;height:100%;box-sizing:border-box;padding:24px 28px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
    background:radial-gradient(circle at 50% 0%, #352D47 0%, #2A2438 70%);
    color:#F4ECD8;font-family:'Inter',sans-serif;
  }
  .label{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:16px;color:#F4ECD8;text-align:center;}
  .bar-container{width:100%;max-width:320px;height:10px;background:#3C3450;border-radius:20px;overflow:hidden;}
  .bar-fill{height:100%;background:linear-gradient(90deg,#8B7299,#C9A15A);border-radius:20px;transition:width 0.3s ease;}
  .pct-display{font-size:14px;color:#C9A15A;font-weight:500;}
  .slider-row{display:flex;align-items:center;gap:10px;width:100%;max-width:320px;}
  input[type="range"]{flex:1;accent-color:#C9A15A;}
  .hint{font-size:10px;color:#8B7299;text-align:center;max-width:280px;line-height:1.4;}
</style>
</head>
<body>
  <div class="widget">
    <div class="label" id="titreProjet">Ma progression</div>
    <div class="bar-container"><div class="bar-fill" id="fill" style="width:50%"></div></div>
    <div class="pct-display"><span id="pctValue">50</span>%</div>
    <div class="slider-row">
      <input type="range" id="slider" min="0" max="100" value="50">
    </div>
    <div class="hint">Ajuste le curseur pour refléter ta progression actuelle. Ne se sauvegarde pas au rechargement — pense à le repositionner si tu fermes Notion.</div>
  </div>
<script>
// Modifie ce texte pour personnaliser le nom du projet affiché
document.getElementById('titreProjet').textContent = "Mon projet en cours";

const slider = document.getElementById('slider');
const fill = document.getElementById('fill');
const pctValue = document.getElementById('pctValue');

slider.addEventListener('input', () => {
  fill.style.width = slider.value + '%';
  pctValue.textContent = slider.value;
});
</script>
</body>
</html>
