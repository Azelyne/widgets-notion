<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Phase lunaire</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500&display=swap');
  html,body{margin:0;height:100%;background:#2A2438;overflow:hidden;}
  .widget{
    width:100%;height:100%;box-sizing:border-box;padding:24px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
    background:radial-gradient(circle at 50% 20%, #352D47 0%, #2A2438 70%);
    color:#F4ECD8;font-family:'Inter',sans-serif;
  }
  .moon-visual{width:80px;height:80px;border-radius:50%;background:#E8DCC4;position:relative;overflow:hidden;box-shadow:0 0 24px rgba(201,161,90,0.25);}
  .moon-shadow{position:absolute;top:0;height:100%;background:#2A2438;}
  .phase-name{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:19px;color:#F4ECD8;text-align:center;}
  .phase-pct{font-size:12px;color:#C9A15A;letter-spacing:0.04em;}
</style>
</head>
<body>
  <div class="widget">
    <div class="moon-visual"><div class="moon-shadow" id="shadow"></div></div>
    <div class="phase-name" id="phaseName">—</div>
    <div class="phase-pct" id="phasePct"></div>
  </div>
<script>
// Calcul de la phase lunaire (algorithme basé sur la nouvelle lune connue du 6 janvier 2000)
function getMoonPhase(date) {
  const knownNewMoon = new Date(2000, 0, 6, 18, 14);
  const lunarCycle = 29.530588853;
  const diff = (date - knownNewMoon) / 86400000;
  let phase = (diff % lunarCycle) / lunarCycle;
  if (phase < 0) phase += 1;
  return phase;
}

const phase = getMoonPhase(new Date());
const pct = Math.round(phase * 100);

let nom = '';
if (phase < 0.03 || phase > 0.97) nom = '🌑 Nouvelle Lune';
else if (phase < 0.22) nom = '🌒 Premier Croissant';
else if (phase < 0.28) nom = '🌓 Premier Quartier';
else if (phase < 0.47) nom = '🌔 Lune Gibbeuse Croissante';
else if (phase < 0.53) nom = '🌕 Pleine Lune';
else if (phase < 0.72) nom = '🌖 Lune Gibbeuse Décroissante';
else if (phase < 0.78) nom = '🌗 Dernier Quartier';
else nom = '🌘 Dernier Croissant';

document.getElementById('phaseName').textContent = nom;
document.getElementById('phasePct').textContent = pct + '% du cycle';

// Visuel simplifié : ombre qui couvre une portion variable selon la phase
const shadow = document.getElementById('shadow');
const width = Math.abs(Math.cos(phase * 2 * Math.PI)) * 80;
if (phase < 0.5) {
  shadow.style.right = '0';
  shadow.style.left = 'auto';
  shadow.style.width = (80 - width) + 'px';
} else {
  shadow.style.left = '0';
  shadow.style.right = 'auto';
  shadow.style.width = (80 - width) + 'px';
}
if (phase < 0.03 || phase > 0.97) shadow.style.width = '80px';
if (phase > 0.47 && phase < 0.53) shadow.style.width = '0px';
</script>
</body>
</html>
