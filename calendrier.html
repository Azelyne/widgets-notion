<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Mini calendrier</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Inter:wght@400;500;600&display=swap');
  html,body{margin:0;height:100%;background:#2A2438;overflow:hidden;}
  .widget{
    width:100%;height:100%;box-sizing:border-box;padding:18px;
    background:#2A2438;color:#F4ECD8;font-family:'Inter',sans-serif;
    display:flex;flex-direction:column;
  }
  .header{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:17px;text-align:center;margin-bottom:10px;text-transform:capitalize;color:#F4ECD8;}
  .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;flex:1;}
  .day-label{font-size:9px;text-align:center;color:#8B7299;text-transform:uppercase;padding-bottom:4px;}
  .day{font-size:11px;text-align:center;padding:5px 0;border-radius:5px;color:#E8DCC4;}
  .day.empty{color:transparent;}
  .day.today{background:#C9A15A;color:#2A2438;font-weight:600;}
</style>
</head>
<body>
  <div class="widget">
    <div class="header" id="header">—</div>
    <div class="grid" id="grid"></div>
  </div>
<script>
const mois = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
const joursLabels = ['L','M','M','J','V','S','D'];

const now = new Date();
document.getElementById('header').textContent = mois[now.getMonth()] + ' ' + now.getFullYear();

const grid = document.getElementById('grid');
joursLabels.forEach(j => {
  const el = document.createElement('div');
  el.className = 'day-label';
  el.textContent = j;
  grid.appendChild(el);
});

const firstDay = new Date(now.getFullYear(), now.getMonth(), 1);
let startOffset = firstDay.getDay() - 1; // lundi = 0
if (startOffset < 0) startOffset = 6;

for (let i=0; i<startOffset; i++) {
  const el = document.createElement('div');
  el.className = 'day empty';
  el.textContent = '.';
  grid.appendChild(el);
}

const lastDate = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
for (let d=1; d<=lastDate; d++) {
  const el = document.createElement('div');
  el.className = 'day' + (d === now.getDate() ? ' today' : '');
  el.textContent = d;
  grid.appendChild(el);
}
</script>
</body>
</html>
