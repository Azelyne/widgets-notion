<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Météo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500&display=swap');
  html,body{margin:0;height:100%;background:#2A2438;overflow:hidden;}
  .widget{
    width:100%;height:100%;box-sizing:border-box;padding:20px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
    background:radial-gradient(circle at 50% 0%, #352D47 0%, #2A2438 70%);
    color:#F4ECD8;font-family:'Inter',sans-serif;text-align:center;
  }
  .icon{font-size:40px;}
  .temp{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:30px;}
  .desc{font-size:12px;color:#C9A15A;text-transform:capitalize;}
  .lieu{font-size:11px;color:#8B7299;margin-top:2px;}
</style>
</head>
<body>
  <div class="widget">
    <div class="icon" id="icon">☁️</div>
    <div class="temp" id="temp">--°</div>
    <div class="desc" id="desc">Chargement...</div>
    <div class="lieu" id="lieu"></div>
  </div>
<script>
// Coordonnées par défaut — REMPLACE par ta ville si besoin (lat/lon en degrés décimaux)
const LAT = 50.70;  // Enghien, Belgique
const LON = 4.04;
const VILLE = "Enghien";

const codeToIcon = {
  0:["☀️","Ciel dégagé"],1:["🌤️","Plutôt dégagé"],2:["⛅","Partiellement nuageux"],3:["☁️","Couvert"],
  45:["🌫️","Brouillard"],48:["🌫️","Brouillard givrant"],
  51:["🌦️","Bruine légère"],53:["🌦️","Bruine"],55:["🌧️","Bruine dense"],
  61:["🌧️","Pluie légère"],63:["🌧️","Pluie"],65:["🌧️","Forte pluie"],
  71:["🌨️","Neige légère"],73:["🌨️","Neige"],75:["❄️","Forte neige"],
  80:["🌦️","Averses légères"],81:["🌧️","Averses"],82:["⛈️","Fortes averses"],
  95:["⛈️","Orage"],96:["⛈️","Orage avec grêle"],99:["⛈️","Violent orage"]
};

fetch(`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,weather_code`)
  .then(r => r.json())
  .then(data => {
    const temp = Math.round(data.current.temperature_2m);
    const code = data.current.weather_code;
    const [icon, desc] = codeToIcon[code] || ["🌡️","—"];
    document.getElementById('temp').textContent = temp + '°C';
    document.getElementById('icon').textContent = icon;
    document.getElementById('desc').textContent = desc;
    document.getElementById('lieu').textContent = VILLE;
  })
  .catch(() => {
    document.getElementById('desc').textContent = "Indisponible";
  });
</script>
</body>
</html>
