<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Progression annuelle</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Inter:wght@400;500;600&display=swap');
  html,body{margin:0;height:100%;background:#2A2438;overflow:hidden;}
  .widget{
    width:100%;height:100%;box-sizing:border-box;padding:24px 28px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
    background:radial-gradient(circle at 50% 0%, #352D47 0%, #2A2438 70%);
    color:#F4ECD8;font-family:'Inter',sans-serif;
  }
  .label{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:16px;color:#F4ECD8;}
  .bar-container{width:100%;max-width:320px;height:10px;background:#3C3450;border-radius:20px;overflow:hidden;position:relative;}
  .bar-fill{height:100%;background:linear-gradient(90deg,#8B7299,#C9A15A);border-radius:20px;transition:width 0.6s ease;}
  .pct{font-size:13px;color:#C9A15A;font-weight:500;}
  .detail{font-size:10.5px;color:#8B7299;}
</style>
</head>
<body>
  <div class="widget">
    <div class="label">Année <span id="year"></span></div>
    <div class="bar-container"><div class="bar-fill" id="fill" style="width:0%"></div></div>
    <div class="pct" id="pct">0%</div>
    <div class="detail" id="detail"></div>
  </div>
<script>
const now = new Date();
const year = now.getFullYear();
document.getElementById('year').textContent = year;

const start = new Date(year, 0, 1);
const end = new Date(year + 1, 0, 1);
const totalDays = (end - start) / 86400000;
const elapsedDays = Math.floor((now - start) / 86400000);
const pct = Math.round((elapsedDays / totalDays) * 100);
const remaining = Math.round(totalDays - elapsedDays);

document.getElementById('fill').style.width = pct + '%';
document.getElementById('pct').textContent = pct + '% de l\'année écoulée';
document.getElementById('detail').textContent = remaining + ' jours restants';
</script>
</body>
</html>
