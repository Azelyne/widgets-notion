<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Horloge</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@400;500&display=swap');
  html,body{margin:0;height:100%;background:#2A2438;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .widget{
    width:100%;height:100%;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:radial-gradient(circle at 50% 0%, #352D47 0%, #2A2438 70%);
    color:#F4ECD8;font-family:'Inter',sans-serif;
  }
  .time{
    font-family:'Cormorant Garamond',serif;
    font-size:clamp(36px,12vw,64px);
    font-weight:600;
    letter-spacing:0.02em;
    color:#F4ECD8;
  }
  .date{
    font-size:clamp(11px,2.5vw,14px);
    color:#C9A15A;
    text-transform:capitalize;
    margin-top:6px;
    letter-spacing:0.04em;
  }
  .moon-divider{
    width:60px;height:1px;background:#8B7299;margin:10px 0;
    position:relative;
  }
  .moon-divider::after{
    content:'';position:absolute;left:50%;top:-3px;
    width:7px;height:7px;border-radius:50%;
    background:#C9A15A;transform:translateX(-50%);
  }
</style>
</head>
<body>
  <div class="widget">
    <div class="time" id="time">--:--</div>
    <div class="moon-divider"></div>
    <div class="date" id="date">—</div>
  </div>
<script>
function update(){
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('time').textContent = h+':'+m;
  const jours = ['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'];
  const mois = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
  document.getElementById('date').textContent = jours[now.getDay()]+' '+now.getDate()+' '+mois[now.getMonth()];
}
update();
setInterval(update, 1000);
</script>
</body>
</html>
